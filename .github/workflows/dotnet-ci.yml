name: .NET CI Pipeline

on:
  push:
    branches: [ main ]      # Runs when you push to main
  pull_request:
    branches: [ main ]      # Runs when you open a PR to main

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # High-performance Linux VM

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Matches your project version

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Solution
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test --no-build --configuration Release --verbosity normal
